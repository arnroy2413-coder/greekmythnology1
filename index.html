<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפים - מבוסס תמונות</title>
    <!-- שימוש ב-Tailwind CSS לעיצוב מהיר ורספונסיבי -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ייבוא פונטים: רוביק לטקסט כללי */
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap');
        
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        /* סביבת תלת-ממד עבור הקלף - היחס המבוקש 9:16 נשמר כאן */
        .card-scene {
            perspective: 1000px;
            aspect-ratio: 9 / 16;
        }

        /* עטיפת הקלף - מבצעת את ההיפוך עם אפקט קופצני (bouncy) ונעים לעין */
        .card-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        /* מצב הפוך */
        .card-wrapper.is-flipped {
            transform: rotateY(180deg);
        }

        /* צדדי הקלף */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden; /* חשוב כדי שהתמונה לא תגלוש מחוץ לפינות המעוגלות */
        }

        /* החלק האחורי של הקלף (המצב ההתחלתי) */
        .card-back {
            background-color: #1e293b;
            border: 8px solid #fbbf24;
        }

        /* החלק הקדמי של הקלף */
        .card-front {
            background-color: #f8fafc;
            transform: rotateY(180deg);
            border: 8px solid #fbbf24;
        }

        /* הגדרות לתמונות הקלפים */
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* מניעת סימון טקסט בטעות */
        .no-select {
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden text-slate-800">

    <!-- מיכל הקלף - שומר על יחס של 9:16 -->
    <div class="card-scene w-[70vw] max-w-[340px] cursor-pointer group" onclick="drawCard()">
        <div id="card" class="card-wrapper group-hover:shadow-[0_0_30px_rgba(251,191,36,0.3)] rounded-2xl transition-shadow duration-300">
            
            <!-- אחורי הקלף (קלף הפתיחה) -->
            <div class="card-face card-back flex items-center justify-center relative">
                <!-- טקסט חלופי אם התמונה חסרה -->
                <div class="absolute inset-0 flex flex-col items-center justify-center text-amber-500 bg-slate-800 z-0 border-8 border-amber-500 rounded-2xl">
                    <span class="text-4xl">🏛️</span>
                    <span class="mt-2 font-bold font-sans">intro.jpg חסר</span>
                </div>
                <!-- תמונת הפתיחה -->
                <img src="images/intro.jpg" alt="קלף פתיחה" class="card-image absolute inset-0 z-10" onerror="this.style.display='none'">
            </div>
            
            <!-- קדמת הקלף (קלפי המשחק) -->
            <div class="card-face card-front no-select relative" id="card-front-content">
                <!-- טקסט חלופי אם התמונה חסרה -->
                <div id="front-fallback" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-200 text-slate-500 z-0 hidden">
                    <span class="text-4xl">🖼️</span>
                    <span id="front-fallback-text" class="mt-2 font-bold font-sans">תמונה חסרה</span>
                </div>
                <!-- תמונת הקלף המוגרל -->
                <img src="" alt="קלף משחק" class="card-image absolute inset-0 z-10" id="front-image">
            </div>
        </div>
    </div>

    <!-- כפתור שליפת קלף -->
    <button onclick="drawCard()" class="mt-12 px-10 py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 text-xl font-bold rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all transform hover:scale-105 active:scale-95 no-select">
        שלוף קלף
    </button>

    <script>
        // מאגר תמונות הקלפים (12 קלפי משחק)
        const cardImages = [
            "images/card1.jpg",
            "images/card2.jpg",
            "images/card3.jpg",
            "images/card4.jpg",
            "images/card5.jpg",
            "images/card6.jpg",
            "images/card7.jpg",
            "images/card8.jpg",
            "images/card9.jpg",
            "images/card10.jpg",
            "images/card11.jpg",
            "images/card12.jpg"
        ];
        
        let deck = [];
        let isCardRevealed = false;
        let isAnimating = false; // הגנה מלחיצות כפולות

        // בניית חפיסת הקלפים מתמונות
        function createDeck() {
            deck = [...cardImages];
        }

        // פונקציה לעדכון התמונה בחזית הקלף
        function renderCardFront(imagePath) {
            const frontImage = document.getElementById('front-image');
            const fallback = document.getElementById('front-fallback');
            const fallbackText = document.getElementById('front-fallback-text');
            
            // איפוס לפני טעינה
            frontImage.style.display = 'block';
            fallback.classList.add('hidden');
            
            frontImage.src = imagePath;
            
            // טיפול במקרה של תמונה חסרה
            frontImage.onerror = function() {
                this.style.display = 'none';
                // חילוץ שם הקובץ בלבד
                fallbackText.textContent = imagePath.split('/').pop() + ' חסר';
                fallback.classList.remove('hidden');
            };
        }

        // ניהול שליפת הקלף והאנימציות
        function drawCard() {
            if (isAnimating) return; // חוסם לחיצות בזמן אנימציה

            const cardElement = document.getElementById('card');
            
            // אם נגמרו הקלפים, מערבבים מחדש
            if (deck.length === 0) {
                createDeck();
            }

            if (isCardRevealed) {
                isAnimating = true;
                // אפקט שקיעה עדין פנימה לפני ההחלפה
                cardElement.style.transform = "rotateY(0deg) scale(0.92)";
                cardElement.classList.remove('is-flipped');
                
                // ממתין שהקלף יסתובב לאחור לפני שמציג את הקלף החדש
                setTimeout(() => {
                    pullRandomCardAndShow();
                    isAnimating = false;
                }, 400); 
            } else {
                pullRandomCardAndShow();
            }
        }

        // שליפת הקלף עצמו מהמערך והצגתו
        function pullRandomCardAndShow() {
            const cardElement = document.getElementById('card');
            
            // הגרלת קלף והסרתו מהמערך כדי שלא יחזור
            const randomIndex = Math.floor(Math.random() * deck.length);
            const selectedCard = deck.splice(randomIndex, 1)[0];
            
            // הזרקת התמונה לקלף
            renderCardFront(selectedCard);
            
            // ביטול ה-scale ומעבר לאנימציית היפוך
            cardElement.style.transform = "";
            cardElement.classList.add('is-flipped');
            isCardRevealed = true;
        }

        // כשמעלים את העמוד, מכינים את החפיסה
        window.onload = () => {
            createDeck();
        };

    </script>
</body>
</html>
